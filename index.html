<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Demo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1 id="top">My Portfolio Website</h1>
    <nav>
      <a href="#about">About</a>
      <a href="#gallery">Gallery</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="about">
      <h2>About This Project</h2>
      <p>This site is built from a template but customized with new layout, responsive design, and accessibility improvements.</p>
    </section>

    <section id="gallery" class="grid">
      <figure>
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600" alt="Mountain landscape">
        <figcaption>Mountain</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600" alt="Ocean waves">
        <figcaption>Ocean</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3?w=600" alt="Forest trees">
        <figcaption>Forest</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d?w=600" alt="City skyline">
        <figcaption>City</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600" alt="Sunset beach">
        <figcaption>Sunset</figcaption>
      </figure>
      <figure>
        <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=600" alt="Countryside field">
        <figcaption>Field</figcaption>
      </figure>
    </section>

    <section id="contact">
      <h2>Contact Me</h2>
      <form>
        <label for="name">Name:</label>
        <input id="name" type="text" required>
        <label for="email">Email:</label>
        <input id="email" type="email" required>
        <label for="message">Message:</label>
        <textarea id="message" required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 My Portfolio</p>
    <a href="#top">Back to Top</a>
  </footer>
</body>
</html>
